<!doctype html>
<html><head><meta charset="utf-8"><title>logo compare</title>
<style>
  body{margin:0;font-family:system-ui;background:#f5f5f5}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:2px}
  .cell{padding:40px;display:flex;align-items:center;justify-content:center;min-height:520px}
  .light{background:#fff}.dark{background:#0f1c28}
  .label{position:absolute;top:8px;left:12px;font-size:12px;color:#666;font-family:monospace}
  .cell{position:relative}
  .dark .label{color:#aaa}
  img,svg{max-width:480px;height:auto;display:block}
</style></head>
<body>
  <div class="row">
    <div class="cell light"><span class="label">ORIGINAL PNG · light</span><img src="/logo3.png"></div>
    <div class="cell light"><span class="label">NEW SVG · light</span><img src="/brand_assets/jt-logo.svg"></div>
    <div class="cell dark"><span class="label">ORIGINAL PNG · dark</span><img src="/logo3.png"></div>
    <div class="cell dark"><span class="label">NEW SVG · dark</span><img src="/brand_assets/jt-logo.svg"></div>
  </div>
</body></html>
